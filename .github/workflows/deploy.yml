name: Deploy NEON BREAKOUT to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia wymagane do publikacji na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tylko jeden deploy naraz; nie przerywaj trwającego
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact (cała gra to statyczne pliki w katalogu głównym)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
