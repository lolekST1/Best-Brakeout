<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NEON BREAKOUT</title>
  <meta name="theme-color" content="#05010f" />
  <meta name="description" content="Najbardziej wypasiona wizualnie wersja Breakouta — neon, power-upy, bossowie, tryby gry i sklep." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item center">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="level">1</span>
      </div>
      <div class="hud-item right">
        <span class="hud-label">LIVES</span>
        <span class="hud-value" id="lives">♥♥♥</span>
      </div>
    </div>

    <div id="combo-badge"><span id="combo-text">x1</span></div>
    <div id="ach-toast"></div>

    <!-- Overlays -->
    <div id="overlay" class="overlay">
      <div class="overlay-panel">
        <h1 class="title glitch" data-text="NEON BREAKOUT">NEON BREAKOUT</h1>
        <p class="subtitle" id="overlay-subtitle">Rozbij wszystkie bloki. Przetrwaj. Błyszcz.</p>
        <div id="overlay-stats" class="overlay-stats hidden"></div>

        <div id="name-entry" class="name-entry hidden">
          <p class="ne-label">🏆 NOWY REKORD! Wpisz swój nick:</p>
          <div class="ne-row">
            <input id="name-input" maxlength="12" placeholder="GRACZ" autocomplete="off" />
            <button id="save-score" class="neon-btn small">ZAPISZ</button>
          </div>
        </div>

        <div id="panel-tabs" class="panel-tabs hidden">
          <button class="tab-btn active" data-panel="scores">🏆 TOP 10</button>
          <button class="tab-btn" data-panel="ach">🎖️ OSIĄGNIĘCIA</button>
          <button class="tab-btn" data-panel="shop">🛒 SKLEP</button>
        </div>

        <div id="scoreboard" class="scoreboard hidden">
          <ol id="score-list"></ol>
        </div>

        <div id="achievements" class="achievements hidden">
          <div id="ach-stats" class="ach-stats"></div>
          <div id="ach-list" class="ach-list"></div>
        </div>

        <div id="shop" class="shop hidden">
          <div id="shop-coins" class="shop-coins"></div>
          <div id="shop-list" class="shop-list"></div>
        </div>

        <div id="mode-row" class="theme-row">
          <span class="theme-label">TRYB</span>
          <button class="mode-btn" data-mode="classic">KLASYCZNY</button>
          <button class="mode-btn" data-mode="endless">NIEKOŃCZĄCY</button>
          <button class="mode-btn" data-mode="timeattack">NA CZAS</button>
          <button class="mode-btn" data-mode="onelife">JEDNO ŻYCIE</button>
          <button class="mode-btn" data-mode="gravity">GRAWITACJA</button>
        </div>
        <div class="challenge-row">
          <button id="challenge-btn" class="neon-btn small">🎯 WYZWANIE DNIA</button>
          <span id="challenge-info"></span>
        </div>

        <div id="theme-row" class="theme-row">
          <span class="theme-label">MOTYW</span>
          <button class="theme-btn" data-theme="neon">NEON</button>
          <button class="theme-btn" data-theme="vapor">VAPORWAVE</button>
          <button class="theme-btn" data-theme="crt">CRT</button>
          <button class="theme-btn" data-theme="matrix">MATRIX</button>
        </div>

        <button id="start-btn" class="neon-btn">START</button>
        <button id="share-btn" class="mini-btn start-hidden">📣 PODZIEL SIĘ WYNIKIEM</button>
        <div class="controls-hint">
          <span>← →  /  A D  &nbsp;ruch</span>
          <span>MYSZ&nbsp;steruje paletką</span>
          <span>SPACJA / KLIK&nbsp;wystrzel</span>
          <span>P / ESC&nbsp;pauza</span>
          <span>🚀 rakiety strzelają same</span>
        </div>
        <div class="mute-row">
          <button id="mute-btn" class="mini-btn">🔊 DŹWIĘK</button>
          <button id="music-btn" class="mini-btn off">🎵 MUZYKA</button>
        </div>
        <div class="volume-row">
          <label>🔊<input id="vol-master" type="range" min="0" max="100" /></label>
          <label>🎵<input id="vol-music" type="range" min="0" max="100" /></label>
          <label>💥<input id="vol-sfx" type="range" min="0" max="100" /></label>
        </div>
      </div>
    </div>

    <div id="touch-controls">
      <div class="touch-pad" id="touch-left">◀</div>
      <div class="touch-pad" id="touch-launch">▲</div>
      <div class="touch-pad" id="touch-right">▶</div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
